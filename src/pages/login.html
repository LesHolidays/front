<!doctype html>
<html lang="fr">
  <head>
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="apple-touch-icon" href="/public/icons/logo_small.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
    <title>Connexion</title>
    <link href="/src/style/style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://use.typekit.net/kgq7gcy.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  </head>
  <body class="login-page">
    <form id="connexion-form" class="login-form">
      <h1 class="login-title">Connexion</h1>
      <label class="form-label">
        Qui es-tu ?
        <select id="select-name" name="user_id"></select>
      </label>
      <label class="form-label">
        Entre ton mot de passe :
        <input
          type="password"
          name="password"
          autocomplete="current-password"
        />
      </label>
      <input type="submit" value="Se connecter" class="button" />
    </form>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/src/script/login.js"></script>
  </body>
</html>
